<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFD700">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Palmchella">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>PALMCHELLA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--bg2:#131315;--text:#fff;--dim:rgba(255,255,255,.35);--desc:rgba(255,255,255,.55);
  --border:rgba(255,255,255,.08);--card:rgba(255,255,255,.03);--card-hover:rgba(255,255,255,.06);
  --gold:#FFD700;--gold-dim:rgba(255,215,0,.15);--gold-glow:rgba(255,215,0,.08);
  --fri:#00D4FF;--sat:#A855F7;--sun:#FF3B8B;
  --fri-bg:rgba(0,212,255,.06);--sat-bg:rgba(168,85,247,.06);--sun-bg:rgba(255,59,139,.06);
  --fri-border:rgba(0,212,255,.2);--sat-border:rgba(168,85,247,.2);--sun-border:rgba(255,59,139,.2);
  --green:#22c55e;--red:#ef4444;--orange:#f97316;
  --nav-h:68px;--header-h:64px;
}
html{background:var(--bg)}
body{
  background:radial-gradient(ellipse at 50% 30%,var(--bg2) 0%,var(--bg) 70%);
  color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;min-height:100dvh;overflow-x:hidden;
  padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 8px);
}
/* ── Header ── */
.app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,10,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:14px 16px 10px;text-align:center;
  border-bottom:1px solid var(--border);
}
.app-header h1{
  font-size:1.4rem;font-weight:800;letter-spacing:3px;
  background:linear-gradient(135deg,#FFE44D,#FFD700,#FFEA00,#FFD700,#FFE44D);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header-line{
  width:180px;height:2px;margin:8px auto 0;border-radius:2px;
  background:linear-gradient(to right,var(--fri),var(--sat),var(--sun),var(--gold));
}
/* ── Bottom Nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(10,10,10,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--dim);font-size:.6rem;
  font-weight:600;letter-spacing:.5px;cursor:pointer;padding:8px 12px;
  transition:color .2s;font-family:inherit;
}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--gold)}
/* ── Tab Content ── */
.tab{display:none;padding:12px 14px 20px;max-width:700px;margin:0 auto}
.tab.active{display:block}
/* ── Day Pills ── */
.day-pills{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.day-pill{
  padding:8px 24px;border-radius:20px;font-size:.75rem;font-weight:700;
  letter-spacing:1.5px;cursor:pointer;border:1px solid var(--border);
  background:var(--card);transition:all .2s;
}
.day-pill.fri.active{background:var(--fri-bg);border-color:var(--fri-border);color:var(--fri)}
.day-pill.sat.active{background:var(--sat-bg);border-color:var(--sat-border);color:var(--sat)}
.day-pill.sun.active{background:var(--sun-bg);border-color:var(--sun-border);color:var(--sun)}
/* ── Stage Filter ── */
.stage-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;scrollbar-width:none}
.stage-filters::-webkit-scrollbar{display:none}
.stage-pill{
  padding:5px 12px;border-radius:12px;font-size:.65rem;font-weight:600;
  letter-spacing:.5px;cursor:pointer;border:1px solid var(--border);
  background:var(--card);color:var(--dim);transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.stage-pill.active{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.25);color:var(--gold)}
/* ── Search ── */
.search-box{
  width:100%;padding:10px 14px 10px 36px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:.85rem;font-family:inherit;
  margin-bottom:12px;outline:none;transition:border-color .2s;
}
.search-box:focus{border-color:rgba(255,215,0,.3)}
.search-wrap{position:relative;margin-bottom:2px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--dim);fill:none;stroke-width:2}
/* ── Set Card ── */
.set-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 14px;margin-bottom:8px;transition:all .2s;position:relative;overflow:hidden;
}
.set-card:hover{background:var(--card-hover)}
.set-card.fri{border-left:3px solid rgba(0,212,255,.4)}
.set-card.sat{border-left:3px solid rgba(168,85,247,.4)}
.set-card.sun{border-left:3px solid rgba(255,59,139,.4)}
.set-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.set-artist{font-size:.9rem;font-weight:700;line-height:1.3}
.set-meta{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.set-time{font-size:.72rem;color:var(--desc);font-weight:500}
.set-stage{
  font-size:.6rem;font-weight:700;letter-spacing:.8px;padding:2px 8px;
  border-radius:6px;background:rgba(255,255,255,.05);color:var(--dim);
}
.set-notes{font-size:.72rem;color:var(--desc);margin-top:6px;line-height:1.4;display:none}
.set-card.expanded .set-notes{display:block}
.set-card .expand-hint{font-size:.6rem;color:var(--dim);margin-top:4px;cursor:pointer}
/* ── Badges ── */
.badge{
  font-size:.55rem;font-weight:800;letter-spacing:1px;padding:2px 7px;
  border-radius:6px;display:inline-block;margin-left:6px;vertical-align:middle;
}
.badge-live{background:rgba(239,68,68,.15);color:var(--red);animation:pulse-live 1.5s ease infinite}
.badge-next{background:rgba(255,215,0,.12);color:var(--gold)}
.badge-both{background:rgba(255,215,0,.12);color:var(--gold)}
.badge-free{background:rgba(34,197,94,.1);color:var(--green)}
.badge-vip{background:rgba(168,85,247,.1);color:var(--sat)}
.badge-canceled{background:rgba(239,68,68,.1);color:var(--red);text-decoration:line-through}
.badge-tbd{background:rgba(255,255,255,.05);color:var(--dim)}
.badge-conflict{background:rgba(249,115,22,.12);color:var(--orange)}
.badge-offsite{background:rgba(239,68,68,.12);color:var(--red);font-weight:800}
.walk-card{
  padding:10px 12px;margin:4px 0 4px 0;border-radius:10px;
  background:rgba(255,215,0,.03);border:1px solid rgba(255,215,0,.08);
  font-size:.7rem;color:var(--desc);line-height:1.5;
}
.walk-card strong{color:var(--gold);font-weight:700}
.walk-card .walk-warn{color:var(--orange);font-weight:600}
.walk-card .walk-ok{color:var(--green)}
.section-divider{
  font-size:.6rem;font-weight:700;letter-spacing:2px;color:var(--dim);
  padding:14px 0 8px;text-transform:uppercase;text-align:center;
  border-top:1px solid var(--border);margin-top:8px;
}
@keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.5}}
/* ── Favorite Heart ── */
.fav-btn{
  background:none;border:none;cursor:pointer;padding:6px;flex-shrink:0;
  display:flex;align-items:center;gap:2px;
}
.fav-btn svg{width:20px;height:20px;stroke:var(--dim);fill:none;stroke-width:2;transition:all .2s}
.fav-btn.m-fav svg{stroke:var(--fri);fill:rgba(0,212,255,.3)}
.fav-btn.s-fav svg{stroke:var(--sun);fill:rgba(255,59,139,.3)}
.fav-btn.both-fav svg{stroke:var(--gold);fill:rgba(255,215,0,.3)}
.fav-toggle{display:flex;gap:2px;align-items:center}
.fav-initial{
  font-size:.55rem;font-weight:800;width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  border:1px solid var(--border);transition:all .2s;
}
.fav-initial.active-m{background:rgba(0,212,255,.15);border-color:var(--fri);color:var(--fri)}
.fav-initial.active-s{background:rgba(255,59,139,.15);border-color:var(--sun);color:var(--sun)}
/* ── My Plan ── */
.person-toggle{display:flex;gap:6px;margin-bottom:14px;justify-content:center}
.person-pill{
  padding:7px 18px;border-radius:16px;font-size:.7rem;font-weight:700;
  letter-spacing:1px;cursor:pointer;border:1px solid var(--border);
  background:var(--card);color:var(--dim);transition:all .2s;
}
.person-pill.active{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.25);color:var(--gold)}
.gap-card{
  text-align:center;padding:8px;font-size:.7rem;color:var(--dim);
  font-style:italic;border-left:2px dashed rgba(255,255,255,.06);margin:4px 0 4px 20px;
}
.plan-day-header{
  font-size:.7rem;font-weight:700;letter-spacing:2px;padding:10px 0 6px;
  margin-top:8px;
}
.plan-day-header.fri-h{color:var(--fri)}
.plan-day-header.sat-h{color:var(--sat)}
.plan-day-header.sun-h{color:var(--sun)}
/* ── Notification Toggle ── */
.notif-row{
  display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:6px;
  border-top:1px solid rgba(255,255,255,.04);
}
.notif-toggle{
  width:36px;height:20px;border-radius:10px;background:rgba(255,255,255,.08);
  border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;
}
.notif-toggle::after{
  content:'';position:absolute;width:16px;height:16px;border-radius:50%;
  background:var(--dim);top:2px;left:2px;transition:all .2s;
}
.notif-toggle.on{background:rgba(255,215,0,.2)}
.notif-toggle.on::after{left:18px;background:var(--gold)}
.notif-time-pills{display:flex;gap:4px}
.notif-time{
  font-size:.6rem;padding:3px 8px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--dim);transition:all .2s;
}
.notif-time.active{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.2);color:var(--gold)}
.notif-label{font-size:.6rem;color:var(--dim);font-weight:600;letter-spacing:.5px}
/* ── Explore ── */
.cat-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;scrollbar-width:none}
.cat-pills::-webkit-scrollbar{display:none}
.cat-pill{
  padding:6px 14px;border-radius:14px;font-size:.65rem;font-weight:600;
  letter-spacing:.3px;cursor:pointer;border:1px solid var(--border);
  background:var(--card);color:var(--dim);transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.cat-pill.active{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.25);color:var(--gold)}
.explore-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:8px;transition:all .2s;
}
.explore-card:hover{background:var(--card-hover)}
.explore-name{font-size:.88rem;font-weight:700}
.explore-desc{font-size:.72rem;color:var(--desc);margin-top:4px;line-height:1.4}
.explore-detail{font-size:.65rem;color:var(--dim);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
.explore-detail span{display:flex;align-items:center;gap:3px}
/* ── Packing ── */
.packing-progress{
  background:rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;margin-bottom:14px;
  border:1px solid var(--border);
}
.progress-bar-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:8px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(to right,var(--fri),var(--gold));transition:width .3s}
.progress-text{font-size:.75rem;font-weight:600;color:var(--desc)}
.tsa-alert{
  background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.15);
  border-radius:10px;padding:10px 12px;margin-bottom:14px;
  font-size:.7rem;color:var(--orange);font-weight:500;
}
.pack-category{
  font-size:.65rem;font-weight:700;letter-spacing:1.5px;color:var(--dim);
  padding:10px 0 6px;text-transform:uppercase;
}
.pack-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  margin-bottom:4px;transition:all .2s;
}
.pack-item.checked{opacity:.4}
.pack-item.checked .pack-text{text-decoration:line-through}
.pack-check{
  width:20px;height:20px;border-radius:6px;border:2px solid var(--border);
  background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;color:transparent;font-size:.7rem;
}
.pack-check.checked{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green)}
.pack-text{font-size:.82rem;flex:1}
.pack-note{font-size:.65rem;color:var(--orange);font-weight:500}
.pack-del{
  background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;font-size:1rem;
  opacity:0;transition:opacity .2s;
}
.pack-item:hover .pack-del{opacity:1}
@media(max-width:600px){.pack-del{opacity:.5}}
.add-item-row{display:flex;gap:6px;margin-bottom:14px}
.add-input{
  flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:.82rem;font-family:inherit;outline:none;
}
.add-input:focus{border-color:rgba(255,215,0,.3)}
.add-btn{
  padding:10px 16px;border-radius:10px;border:1px solid rgba(255,215,0,.25);
  background:rgba(255,215,0,.08);color:var(--gold);font-size:.75rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;
}
.add-btn:hover{background:rgba(255,215,0,.15)}
/* ── Info ── */
.info-section{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  margin-bottom:10px;overflow:hidden;
}
.info-header{
  padding:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  font-size:.85rem;font-weight:700;
}
.info-header svg{width:16px;height:16px;stroke:var(--dim);fill:none;stroke-width:2;transition:transform .2s}
.info-section.open .info-header svg{transform:rotate(180deg)}
.info-body{padding:0 14px 14px;display:none;font-size:.78rem;color:var(--desc);line-height:1.6}
.info-section.open .info-body{display:block}
.info-body strong{color:var(--text);font-weight:600}
.info-body ul{list-style:none;padding:0}
.info-body li{padding:3px 0;padding-left:12px;position:relative}
.info-body li::before{content:'';position:absolute;left:0;top:10px;width:4px;height:4px;border-radius:50%;background:var(--gold)}
.info-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.info-label{color:var(--dim);font-size:.7rem}
.info-value{font-size:.75rem;font-weight:500}
.conf-code{
  font-family:monospace;background:rgba(255,215,0,.06);padding:2px 8px;
  border-radius:6px;color:var(--gold);font-size:.75rem;font-weight:600;
}
/* ── Empty State ── */
.empty-state{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-state p{font-size:.85rem;margin-top:8px}
/* ── Util ── */
.section-title{
  font-size:.65rem;font-weight:700;letter-spacing:2px;color:var(--dim);
  padding:8px 0;text-transform:uppercase;
}
.gold-text{color:var(--gold)}
.mb-8{margin-bottom:8px}
.mt-12{margin-top:12px}
/* ── Light Mode ── */
body.light-mode{
  background:#f5f5f0;
  --bg:#f5f5f0;--bg2:#ffffff;--text:#1a1a1a;
  --dim:rgba(0,0,0,.4);--desc:rgba(0,0,0,.55);
  --border:rgba(0,0,0,.1);--card:rgba(0,0,0,.03);--card-hover:rgba(0,0,0,.06);
}
body.light-mode .app-header{background:rgba(245,245,240,.92)}
body.light-mode .bottom-nav{background:rgba(245,245,240,.95)}
body.light-mode .app-header h1{
  background:linear-gradient(135deg,#B8860B,#996515,#B8860B);
  -webkit-background-clip:text;background-clip:text;
}
/* ── Install Banner ── */
.install-banner{
  background:linear-gradient(135deg,rgba(255,215,0,.08),rgba(0,212,255,.05));
  border:1px solid rgba(255,215,0,.15);border-radius:12px;
  padding:12px 14px;margin:0 14px 10px;display:flex;align-items:center;gap:10px;
  font-size:.75rem;color:var(--desc);
}
.install-banner strong{color:var(--gold)}
.install-banner .dismiss{
  background:none;border:none;color:var(--dim);cursor:pointer;font-size:1.1rem;
  margin-left:auto;padding:4px;
}
.install-banner.hidden{display:none}
/* ── Share / Add Bar ── */
.action-bar{display:flex;gap:8px;margin:0 14px 10px}
.action-btn{
  flex:1;padding:10px 12px;border-radius:12px;font-size:.72rem;font-weight:700;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .2s;border:1px solid;
}
.action-btn.share{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.25);color:var(--gold)}
.action-btn.share:hover{background:rgba(255,215,0,.15)}
.action-btn.add-home{background:rgba(0,212,255,.06);border-color:rgba(0,212,255,.2);color:var(--fri)}
.action-btn.add-home:hover{background:rgba(0,212,255,.1)}
.action-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
/* ── Geo Dot ── */
.geo-dot{
  position:absolute;width:14px;height:14px;z-index:10;
  transform:translate(-50%,-50%);pointer-events:none;
  transition:left .8s ease,top .8s ease;
}
.geo-dot::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:var(--green);box-shadow:0 0 8px var(--green);
}
.geo-dot::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid var(--green);opacity:.5;
  animation:geo-pulse 2s ease infinite;
}
@keyframes geo-pulse{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}
.geo-label{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  font-size:.5rem;font-weight:800;color:var(--green);letter-spacing:.5px;
  white-space:nowrap;background:rgba(10,10,10,.8);padding:1px 5px;border-radius:4px;
}
.geo-status{font-size:.55rem;color:var(--dim);text-align:center;margin-top:4px}
/* ── Mode Toggle ── */
.mode-toggle{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:1px solid var(--border);border-radius:8px;
  padding:4px 8px;cursor:pointer;color:var(--dim);font-size:.8rem;
  transition:all .2s;
}
.mode-toggle:hover{border-color:rgba(255,215,0,.3);color:var(--gold)}
/* ── Stage Map ── */
.stage-map{padding:8px 0}
.map-container{
  position:relative;width:100%;aspect-ratio:4/3;max-width:500px;margin:0 auto;
  background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;
}
.map-stage{
  position:absolute;padding:6px 10px;border-radius:10px;font-size:.6rem;
  font-weight:700;letter-spacing:.5px;text-align:center;white-space:nowrap;
  border:1px solid;cursor:default;transition:all .2s;z-index:2;
}
.map-stage:hover{transform:scale(1.08)}
.map-stage.main{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.25);color:var(--gold);left:8%;top:12%}
.map-stage.outdoor{background:rgba(255,215,0,.06);border-color:rgba(255,215,0,.15);color:var(--gold);left:8%;top:42%}
.map-stage.gobi{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.2);color:var(--sat);left:38%;top:30%}

// UTILITIES
// ═══════════════════════════════════════
function fmtTime(mins) {
  if (mins === 0) return 'TBD';
  let h = Math.floor(mins / 60);
  let m = mins % 60;
  let suffix = 'AM';
  let display = h;
  if (h >= 24) { display = h - 24; suffix = 'AM'; }
  else if (h >= 12) { suffix = 'PM'; if (h > 12) display = h - 12; }
  if (display === 0) display = 12;
  return display + ':' + String(m).padStart(2, '0') + ' ' + suffix;
}

function fmtRange(s, e) {
  if (s === 0 && e === 0) return 'Time TBD';
  return fmtTime(s) + ' - ' + fmtTime(e);
}

function getNowPT() {
  const now = new Date();
  const pt = new Date(now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
  return pt;
}

function getNowMins() {
  const pt = getNowPT();
  return pt.getHours() * 60 + pt.getMinutes();
}

function getTodayDay() {
  const pt = getNowPT();
  const m = pt.getMonth() + 1;
  const d = pt.getDate();
  if (m === 4 && d === 18) return 'friday';
  if (m === 4 && d === 19) return 'saturday';
  if (m === 4 && d === 20) return 'sunday';
  return null;
}

function isLive(set) {
  const today = getTodayDay();
  if (!today || !SCHEDULE[today]) return false;
  if (!SCHEDULE[today].includes(set)) return false;
  const now = getNowMins();
  return now >= set.start && now <= set.end && !set.tbd;
}

function isUpNext(set) {
  const today = getTodayDay();
  if (!today || !SCHEDULE[today]) return false;
  if (!SCHEDULE[today].includes(set)) return false;
  const now = getNowMins();
  return set.start > now && set.start - now <= 30 && !set.tbd;
}

function renderStageFilters() {
  const el = document.getElementById('stage-filters');
  el.innerHTML = STAGES.map(s =>
    `<div class="stage-pill${s===currentStage?' active':''}" onclick="setStage('${s}')">${s}</div>`
  ).join('');
}

function renderSchedule() {
  const list = document.getElementById('schedule-list');
  const search = document.querySelector('.search-box').value.toLowerCase().trim();
  let sets = SCHEDULE[currentDay] || [];

  if (currentStage !== 'All') sets = sets.filter(s => s.stage === currentStage);
  if (search) sets = sets.filter(s => s.artist.toLowerCase().includes(search));

  // Hide past sets if viewing today's schedule
  const today = getTodayDay();
  if (today === currentDay) {
    const now = getNowMins();
    sets = sets.filter(s => s.tbd || s.end > now);
  }

  // Split into favorited and not
  const isFav = s => mavvieFavs.has(s.id) || stefFavs.has(s.id);
  const favSets = sets.filter(isFav);
  const otherSets = sets.filter(s => !isFav(s));

  // Sort each group by start time, TBD at end
  const sortFn = (a, b) => {
    if (a.tbd && !b.tbd) return 1;
    if (!a.tbd && b.tbd) return -1;
    return a.start - b.start;
  };
  favSets.sort(sortFn);
  otherSets.sort(sortFn);
  sets = favSets.concat(otherSets);

  const dc = DAY_CLASS[currentDay];

  let html = '';
  let addedDivider = false;
  const favCount = favSets.length;

  sets.forEach((s, idx) => {
    // Add divider between favorited and other sets
    if (!addedDivider && idx === favCount && favCount > 0 && otherSets.length > 0) {
      html += '<div class="section-divider">OTHER SETS</div>';
      addedDivider = true;
    }

    const mFav = mavvieFavs.has(s.id);
    const sFav = stefFavs.has(s.id);
    const bothFav = mFav && sFav;
    const live = isLive(s);
    const next = isUpNext(s);

    let badges = '';
    if (live) badges += '<span class="badge badge-live">LIVE NOW</span>';
    if (next) badges += '<span class="badge badge-next">UP NEXT</span>';
    if (bothFav) badges += '<span class="badge badge-both">BOTH</span>';
    if (s.tbd) badges += '<span class="badge badge-tbd">TIME TBD</span>';

    html += `<div class="set-card ${dc}${s.notes?' expandable':''}" onclick="toggleExpand(this)" data-id="${s.id}">
      <div class="set-top">
        <div style="flex:1">
          <div class="set-artist">${s.artist}${badges}</div>
          <div class="set-meta">
            <span class="set-time">${fmtRange(s.start,s.end)}</span>
            <span class="set-stage">${s.stage.toUpperCase()}</span>
          </div>
        </div>
        <div class="fav-toggle">
          <div class="fav-initial${mFav?' active-m':''}" onclick="event.stopPropagation();toggleFav('${s.id}','m')" title="Mavvie">M</div>
          <div class="fav-initial${sFav?' active-s':''}" onclick="event.stopPropagation();toggleFav('${s.id}','s')" title="Stefania">S</div>
        </div>
      </div>
      ${s.notes?`<div class="set-notes">${s.notes}</div><div class="expand-hint">tap for W1 details</div>`:''}
    </div>`;
  });

  list.innerHTML = html || '<div class="empty-state"><p>No sets found</p></div>';
}

function toggleFav(id, who) {

// ═══════════════════════════════════════
// RENDER: MY PLAN
// ═══════════════════════════════════════
function renderPlan() {
  const list = document.getElementById('plan-list');
  let html = '';

  DAYS.forEach(day => {
    const dc = DAY_CLASS[day];
    // Combined: union of both favorites
    let sets = SCHEDULE[day].filter(s => mavvieFavs.has(s.id) || stefFavs.has(s.id));

    sets.sort((a, b) => {
      if (a.tbd && !b.tbd) return 1;
      if (!a.tbd && b.tbd) return -1;
      return a.start - b.start;
    });

    // Hide past sets if viewing today
    const today = getTodayDay();
    if (today === day) {
      const now = getNowMins();
      sets = sets.filter(s => s.tbd || s.end > now);
    }

    if (sets.length === 0) return;

    html += `<div class="plan-day-header ${dc}-h">${DAY_LABELS[day]}</div>`;

    for (let i = 0; i < sets.length; i++) {
      const s = sets[i];
      const mFav = mavvieFavs.has(s.id);
      const sFav = stefFavs.has(s.id);
      const bothFav = mFav && sFav;
      const live = isLive(s);
      const next = isUpNext(s);

      let badges = '';
      if (live) badges += '<span class="badge badge-live">LIVE NOW</span>';
      if (next) badges += '<span class="badge badge-next">UP NEXT</span>';
      if (bothFav) badges += '<span class="badge badge-both">BOTH</span>';
      else if (mFav && !sFav) badges += '<span class="badge" style="background:rgba(0,212,255,.1);color:var(--fri)">M</span>';
      else if (!mFav && sFav) badges += '<span class="badge" style="background:rgba(255,59,139,.1);color:var(--sun)">S</span>';

      html += `<div class="set-card ${dc}" data-id="${s.id}">
        <div class="set-top">
          <div style="flex:1">
            <div class="set-artist">${s.artist}${badges}</div>
            <div class="set-meta">
              <span class="set-time">${fmtRange(s.start,s.end)}</span>
              <span class="set-stage">${s.stage.toUpperCase()}</span>
            </div>
          </div>
          <div class="fav-toggle">
            <div class="fav-initial${mFav?' active-m':''}" onclick="toggleFav('${s.id}','m')" title="Mavvie">M</div>
            <div class="fav-initial${sFav?' active-s':''}" onclick="toggleFav('${s.id}','s')" title="Stefania">S</div>
          </div>
        </div>
      </div>`;

      // Walking directions & transition to next set
      if (i < sets.length - 1 && !s.tbd && !sets[i+1].tbd) {
        const nextSet = sets[i+1];
        const walkMins = getWalk(s.stage, nextSet.stage);
        const gap = nextSet.start - s.end;
        const sameStage = s.stage === nextSet.stage;

        if (gap < 0) {
          // OVERLAP
          const overlap = Math.abs(gap);
          if (sameStage) {
            html += `<div class="walk-card"><span class="walk-warn">${overlap}min overlap -- same stage (${s.stage}), so stay put. You'll catch the tail end of ${s.artist} and the start of ${nextSet.artist}.</span></div>`;
          } else {
            const leaveAt = nextSet.start - walkMins;
            html += `<div class="walk-card"><span class="walk-warn">${overlap}min overlap!</span> ${s.stage} to ${nextSet.stage} = <strong>${walkMins}min walk</strong>.<br>` +
              `Leave ${s.artist} at <strong>${fmtTime(leaveAt)}</strong> to catch ${nextSet.artist}'s start. You'll miss the last ${overlap + walkMins}min of ${s.artist}.</div>`;
          }
        } else if (sameStage) {
          html += `<div class="walk-card"><span class="walk-ok">Same stage!</span> ${gap}min break at ${s.stage}. Hold your spot or grab a drink nearby.</div>`;
        } else if (gap < walkMins + 5) {
          // Tight transition
          const leaveAt = s.end;
          html += `<div class="walk-card"><span class="walk-warn">Tight!</span> Only ${gap}min gap. ${s.stage} to ${nextSet.stage} = <strong>${walkMins}min walk</strong>.<br>` +
            `Leave ${s.artist} right when it ends at <strong>${fmtTime(leaveAt)}</strong> and walk fast.</div>`;
        } else {
          // Comfortable transition
          const leaveAt = nextSet.start - walkMins - 5;
          const freeTime = gap - walkMins;
          let suggestion = '';
          if (freeTime >= 30) suggestion = ' Grab food, hit a pop-up, or find a speakeasy.';
          else if (freeTime >= 15) suggestion = ' Quick break -- water refill or check a brand activation.';
          html += `<div class="walk-card">${gap}min gap. ${s.stage} to ${nextSet.stage} = <strong>${walkMins}min walk</strong>. ${freeTime}min free time.${suggestion}<br>` +
            `Leave by <strong>${fmtTime(leaveAt)}</strong> to arrive with 5min buffer.</div>`;
        }
      }
    }
  });

  list.innerHTML = html || '<div class="empty-state"><p>No favorites yet! Go to Schedule and tap M or S to star artists.</p></div>';
}

function toggleNotif(id) {
  if (!notifications[id]) notifications[id] = { on: false, mins: 15 };
  notifications[id].on = !notifications[id].on;
  saveArr('chq_notifs', notifications);
  renderPlan();
  if (notifications[id].on) scheduleNotif(id);
}

function setNotifTime(id, mins) {
  if (!notifications[id]) notifications[id] = { on: true, mins };
  notifications[id].mins = mins;
  saveArr('chq_notifs', notifications);
  renderPlan();
  if (notifications[id].on) scheduleNotif(id);
}

// ── ntfy.sh notifications ──
const NTFY_TOPIC = 'mavvie-coachella-2026';
const activeTimers = {};

function scheduleNotif(id) {
  if (activeTimers[id]) clearTimeout(activeTimers[id]);
  const notif = notifications[id];
  if (!notif?.on) return;

  // Find the set
  let set = null;
  for (const day of DAYS) {
    set = SCHEDULE[day].find(s => s.id === id);
    if (set) break;
  }
  if (!set || set.tbd) return;

  const today = getTodayDay();
  if (!today) return;
  if (!SCHEDULE[today].includes(set)) return;

  const nowMins = getNowMins();
  const alertAt = set.start - notif.mins;
  const diff = alertAt - nowMins;

  if (diff > 0) {
    activeTimers[id] = setTimeout(() => {
      sendNtfy(set.artist, set.stage, notif.mins);
    }, diff * 60 * 1000);
  }
}

function sendNtfy(artist, stage, mins) {
  const msg = `${artist} starts in ${mins} min at ${stage}!`;
  fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
    method: 'POST',
    headers: { 'Title': 'CoachellaHQ', 'Priority': '4', 'Tags': 'musical_note' },
    body: msg
  }).catch(() => {});
  // Also browser notification as backup
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('CoachellaHQ', { body: msg });
  }
}

function initNotifs() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  Object.keys(notifications).forEach(id => {
    if (notifications[id]?.on) scheduleNotif(id);
  });
}

// RENDER: EXPLORE
// ═══════════════════════════════════════
function renderExploreCats() {
  const el = document.getElementById('cat-pills');
  el.innerHTML = EXPLORE_CATS.map(c =>
    `<div class="cat-pill${c===exploreCat?' active':''}" onclick="setExploreCat('${c}')">${c}</div>`
  ).join('');
}

function renderExplore() {
  const list = document.getElementById('explore-list');
  let items = EXPLORE;
  if (exploreCat !== 'All') items = items.filter(e => e.cat === exploreCat);

  // Sort: on-grounds first, off-site at bottom
  items.sort((a, b) => {
    if (a.offsite && !b.offsite) return 1;
    if (!a.offsite && b.offsite) return -1;
    return 0;
  });

  let html = '';
  let addedOffsiteDivider = false;

  items.forEach(e => {
    if (e.offsite && !addedOffsiteDivider && exploreCat === 'All') {
      html += '<div class="section-divider" style="color:var(--red)">OFF-SITE (NEED UBER)</div>';
      addedOffsiteDivider = true;
    }

    const fav = exploreFavs.has(e.id);
    const badgeHtml = (e.badges||[]).map(b => {
      if (b === 'FREE') return '<span class="badge badge-free">FREE</span>';
      if (b === 'VIP') return '<span class="badge badge-vip">VIP</span>';
      if (b === 'OFF-SITE') return '<span class="badge badge-offsite">OFF-SITE</span>';
      return `<span class="badge badge-tbd">${b}</span>`;
    }).join('');

    html += `<div class="explore-card">
      <div class="set-top">
        <div style="flex:1">
          <div class="explore-name">${e.name} ${badgeHtml}</div>
          <div class="explore-desc">${e.desc}</div>
          <div class="explore-detail">
            ${e.where?`<span>Location: ${e.where}</span>`:''}
            ${e.hours?`<span>Hours: ${e.hours}</span>`:''}
            ${e.price?`<span>Price: ${e.price}</span>`:''}
          </div>
        </div>
        <button class="fav-btn${fav?' both-fav':''}" onclick="toggleExploreFav('${e.id}')">
          ${HEART}
        </button>
      </div>
    </div>`;
  });

  list.innerHTML = html;
}

function setExploreCat(cat) {
  exploreCat = cat;
  renderExploreCats();
  renderExplore();
}

function toggleExploreFav(id) {
  if (exploreFavs.has(id)) exploreFavs.delete(id); else exploreFavs.add(id);
  saveExploreFavs();
  renderExplore();
}

// ═══════════════════════════════════════
// RENDER: PACKING
// ═══════════════════════════════════════
function renderPacking() {
  const list = document.getElementById('packing-list');
  const items = packPerson === 'mavvie' ? packingMavvie : packingStefania;

  // Group by category
  const cats = {};
  items.forEach(item => {
    if (!cats[item.cat]) cats[item.cat] = [];
    cats[item.cat].push(item);
  });

  // Sort: unchecked first within each cat
  Object.values(cats).forEach(arr => arr.sort((a,b) => a.checked - b.checked));

  let html = '';
  const total = items.length;
  const checked = items.filter(i => i.checked).length;

  // Progress
  document.getElementById('pack-progress').innerHTML = `
    <div class="progress-text">${checked} / ${total} packed</div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${total?Math.round(checked/total*100):0}%"></div></div>
  `;

  for (const [cat, arr] of Object.entries(cats)) {
    html += `<div class="pack-category">${cat}</div>`;
    arr.forEach(item => {
      html += `<div class="pack-item${item.checked?' checked':''}">
        <button class="pack-check${item.checked?' checked':''}" onclick="togglePackCheck('${item.id}')">${item.checked?'✓':''}</button>
        <span class="pack-text">${item.text}</span>
        ${item.note?`<span class="pack-note">${item.note}</span>`:''}
        <button class="pack-del" onclick="deletePackItem('${item.id}')">×</button>
      </div>`;
    });
  }

  list.innerHTML = html || '<div class="empty-state"><p>No items yet. Add something above!</p></div>';
}

function togglePackCheck(id) {
  const items = packPerson === 'mavvie' ? packingMavvie : packingStefania;
  const item = items.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  savePacking();
  renderPacking();
}

function deletePackItem(id) {
  if (packPerson === 'mavvie') {
    packingMavvie = packingMavvie.filter(i => i.id !== id);
  } else {
    packingStefania = packingStefania.filter(i => i.id !== id);
  }
  savePacking();
  renderPacking();
}

function addPackItem() {
  const input = document.getElementById('add-pack-input');
  const text = input.value.trim();
  if (!text) return;
  const id = 'p_' + Date.now();
  const item = { id, text, cat: 'Added', checked: false };
  if (packPerson === 'mavvie') packingMavvie.push(item);
  else packingStefania.push(item);
  input.value = '';
  savePacking();
  renderPacking();
}

function setPackPerson(p) {
  packPerson = p;
  document.querySelectorAll('#tab-packing .person-pill').forEach(el => {
    el.classList.toggle('active', el.textContent.toLowerCase() === p);
  });
  renderPacking();
}

// Enter key for add input
document.getElementById('add-pack-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') addPackItem();
});

// TAB SWITCHING
// ═══════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', ['schedule','plan','explore','packing','info'][i] === tab);
  });

  if (tab === 'schedule') renderSchedule();
  else if (tab === 'plan') renderPlan();
  else if (tab === 'explore') { renderExploreCats(); renderExplore(); }
  else if (tab === 'packing') renderPacking();
  else if (tab === 'info') renderInfo();
}

// ═══════════════════════════════════════
// GEOLOCATION ON STAGE MAP
// ═══════════════════════════════════════
// Approximate Coachella venue bounds (Empire Polo Club)
const VENUE = {
  north: 33.6828, south: 33.6772,
  west: -116.2418, east: -116.2332
};
let geoWatchId = null;

function startGeo() {
  if (!navigator.geolocation) return;
  geoWatchId = navigator.geolocation.watchPosition(
    pos => updateGeoDot(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy),
    err => {
      const el = document.getElementById('geo-status');
      if (err.code === 1) el.textContent = 'Location access denied. Enable in Settings to see your position.';
      else el.textContent = '';
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 }
  );
}

function updateGeoDot(lat, lng, accuracy) {
  const dot = document.getElementById('geo-dot');
  const status = document.getElementById('geo-status');

  // Check if within venue bounds (with some padding)
  const pad = 0.002; // ~200m buffer
  const inVenue = lat >= VENUE.south - pad && lat <= VENUE.north + pad &&
                  lng >= VENUE.west - pad && lng <= VENUE.east + pad;

  if (!inVenue) {
    dot.style.display = 'none';
    status.textContent = 'You\'re not at the venue yet. The green dot will appear when you\'re on the grounds.';
    return;
  }

  // Map lat/lng to percentage position on the map
  const xPct = ((lng - VENUE.west) / (VENUE.east - VENUE.west)) * 100;
  const yPct = ((VENUE.north - lat) / (VENUE.north - VENUE.south)) * 100;

  // Clamp to map bounds
  const x = Math.max(5, Math.min(95, xPct));
  const y = Math.max(5, Math.min(95, yPct));

  dot.style.display = 'block';
  dot.style.left = x + '%';
  dot.style.top = y + '%';
  status.textContent = accuracy < 30 ? 'Live location (GPS)' : `Live location (~${Math.round(accuracy)}m accuracy)`;
}

// ═══════════════════════════════════════
// WHAT'S HAPPENING NOW
// ═══════════════════════════════════════
function renderNowSection() {
  const el = document.getElementById('now-section');
  const today = getTodayDay();
  if (!today) {
    // Not festival day -- show countdown
    el.innerHTML = `<div class="now-card">
      <div class="now-label">COACHELLA WEEKEND 2</div>
      <div class="now-artist">April 18-20, 2026</div>
      <div class="now-meta">Gates open at 11 AM PT each day. Your flight lands April 17 at 2:43 PM.</div>
    </div>`;
    return;
  }

  const now = getNowMins();
  const sets = SCHEDULE[today].filter(s => mavvieFavs.has(s.id) || stefFavs.has(s.id));
  sets.sort((a,b) => a.start - b.start);

  const liveSets = sets.filter(s => !s.tbd && s.start <= now && s.end > now);
  const nextSets = sets.filter(s => !s.tbd && s.start > now);
  const nextSet = nextSets[0];

  let html = '<div class="now-card"><div class="now-label">RIGHT NOW</div>';

  if (liveSets.length > 0) {
    liveSets.forEach(s => {
      html += `<div class="now-artist">${s.artist} <span class="badge badge-live">LIVE</span></div>`;
      html += `<div class="now-meta">${s.stage} -- ends at ${fmtTime(s.end)}</div>`;
    });
  } else {
    html += '<div class="now-meta" style="color:var(--dim)">No favorited sets playing right now</div>';
  }

  if (nextSet) {
    const minsUntil = nextSet.start - now;
    html += '<div class="now-next">';
    html += `<div class="now-next-label">UP NEXT -- in ${minsUntil} min</div>`;
    html += `<div class="now-artist" style="font-size:.85rem;margin-top:4px">${nextSet.artist}</div>`;
    html += `<div class="now-meta">${nextSet.stage} at ${fmtTime(nextSet.start)}</div>`;
    html += '</div>';
  }

  // Free stuff available now
  const freeNow = [];
  if (now >= 13*60 && now < 21*60) freeNow.push('Starbucks free drinks');
  if (now >= 15*60) freeNow.push('Red Bull Mirage free slushies');
  if (now >= 13*60 && now < 20*60+30) freeNow.push('e.l.f. free products (by Gobi)');
  if (now >= 13*60 && now < 21*60) freeNow.push('Sol de Janeiro free samples');
  if (now >= 13*60) freeNow.push('Barbie Charm Bar, Pinterest, Google Gemini photobooths');

  if (freeNow.length > 0) {
    html += '<div class="now-next" style="border-top-color:rgba(34,197,94,.15)">';
    html += '<div class="now-next-label" style="color:var(--green)">FREE STUFF AVAILABLE NOW</div>';
    html += `<div class="now-meta" style="margin-top:4px">${freeNow.join(' / ')}</div>`;
    html += '</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

// INIT
// ═══════════════════════════════════════
function init() {
  restoreMode();
  startGeo();

  // Auto-select today if during festival
  const today = getTodayDay();
  if (today) setDay(today);

  renderStageFilters();
  renderSchedule();
  renderNowSection();
  renderPlan();
  renderExploreCats();
  renderExplore();
  renderPacking();
  renderInfo();
  initNotifs();

  // Update live badges and now section every minute
  setInterval(() => {
    if (currentTab === 'schedule') renderSchedule();
    if (currentTab === 'plan') { renderNowSection(); renderPlan(); }
  }, 60000);
}
